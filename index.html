<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>023 รายรับ-รายจ่าย MyTracker v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <div class="text-center py-4">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">023 MyTracker</h1>
            <p class="text-sm text-slate-500 mt-1">ระบบบันทึกรายรับ-รายจ่ายส่วนตัว</p>
        </div>
        
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/80 p-6 transition-all">
            <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
                <span>📝 เพิ่มรายการใหม่</span>
            </h2>
            
            <form id="trackerForm023" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">ประเภท</label>
                        <select id="type" required class="block w-full rounded-xl border-slate-200 shadow-sm p-3 border bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none">
                            <option value="รายรับ">รายรับ 📈</option>
                            <option value="รายจ่าย">รายจ่าย 📉</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">หมวดหมู่</label>
                        <input type="text" id="category" placeholder="เช่น เงินเดือน, ค่าอาหาร" required class="block w-full rounded-xl border-slate-200 shadow-sm p-3 border bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">จำนวนเงิน (บาท)</label>
                        <input type="number" id="amount" placeholder="0" required min="1" class="block w-full rounded-xl border-slate-200 shadow-sm p-3 border bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">บันทึกช่วยจำ</label>
                        <input type="text" id="note" placeholder="รายละเอียดเพิ่มเติม..." class="block w-full rounded-xl border-slate-200 shadow-sm p-3 border bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-3 px-4 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-sm active:scale-[0.99] transition-all cursor-pointer">
                    บันทึกข้อมูล
                </button>
            </form>
            
            <div id="statusMessage" class="mt-4 text-center text-sm font-medium p-3 rounded-xl hidden"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200/80 p-4">
                <span class="text-xs font-semibold text-slate-400 block mb-1">รวมรายรับ</span>
                <span id="totalIncome" class="text-xl font-bold text-green-600">0 บาท</span>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200/80 p-4">
                <span class="text-xs font-semibold text-slate-400 block mb-1">รวมรายจ่าย</span>
                <span id="totalExpense" class="text-xl font-bold text-red-600">0 บาท</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/80 overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="font-bold text-slate-900">📊 ประวัติรายการ 023</h3>
                <span id="itemCount" class="text-xs bg-slate-200 text-slate-600 font-medium px-2.5 py-1 rounded-full">0 รายการ</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-100 text-left text-sm">
                    <thead class="bg-slate-50 text-slate-400 text-xs uppercase tracking-wider font-semibold">
                        <tr>
                            <th class="px-6 py-3">วันที่</th>
                            <th class="px-6 py-3">ประเภท</th>
                            <th class="px-6 py-3">หมวดหมู่</th>
                            <th class="px-6 py-3 text-right">จำนวนเงิน</th>
                            <th class="px-6 py-3">บันทึก</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody" class="divide-y divide-slate-100 text-slate-600">
                        <tr>
                            <td colspan="5" class="text-center py-8 text-slate-400">กำลังโหลดประวัติข้อมูล...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // ลิงก์ Apps Script ของคุณ 023
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby3ZnOIYqRaLqriff5d20xGiUNL5u4rzE9-VoeNiKZHoo_nLxtDcmj40HSFMPOfXBmHdQ/exec';
        const form = document.getElementById('trackerForm023');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        const tableBody = document.getElementById('historyTableBody');

        // ฟังก์ชันคำนวณและแสดงยอดรวม
        function updateSummary(data) {
            let income = 0;
            let expense = 0;
            
            data.forEach(item => {
                const amt = Number(item.Amount) || 0;
                if (item.Type === 'รายรับ') income += amt;
                if (item.Type === 'รายจ่าย') expense += amt;
            });

            document.getElementById('totalIncome').innerText = income.toLocaleString() + ' บาท';
            document.getElementById('totalExpense').innerText = expense.toLocaleString() + ' บาท';
            document.getElementById('itemCount').innerText = data.length + ' รายการ';
        }

        // ฟังก์ชันโหลดข้อมูลจาก Google Sheet
        function loadHistory() {
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    if (!data || data.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-slate-400">ยังไม่มีข้อมูลบันทึกในระบบ 023</td></tr>`;
                        updateSummary([]);
                        return;
                    }
                    
                    updateSummary(data);
                    data.reverse(); // เอาอันล่าสุดขึ้นก่อน
                    
                    tableBody.innerHTML = data.map(item => {
                        const isIncome = item.Type === 'รายรับ';
                        const typeBadge = isIncome 
                            ? '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-50 text-green-700 border border-green-200">รายรับ</span>' 
                            : '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-50 text-red-700 border border-red-200">รายจ่าย</span>';
                        
                        const amtColor = isIncome ? 'text-green-600' : 'text-red-600';
                        const amtSign = isIncome ? '+' : '-';
                        const displayDate = item.Date ? item.Date.split(' ')[0] : '-'; 

                        return `
                            <tr class="hover:bg-slate-50/80 transition-colors">
                                <td class="px-6 py-4 text-slate-500">${displayDate}</td>
                                <td class="px-6 py-4">${typeBadge}</td>
                                <td class="px-6 py-4 font-medium text-slate-800">${item.Category || '-'}</td>
                                <td class="px-6 py-4 text-right font-bold ${amtColor}">${amtSign}${Number(item.Amount).toLocaleString()} ฿</td>
                                <td class="px-6 py-4 text-slate-400 text-xs max-w-[150px] truncate">${item.Note || '-'}</td>
                            </tr>
                        `;
                    }).join('');
                })
                .catch(err => {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-amber-600 bg-amber-50/50">⚠️ โดนบล็อกสิทธิ์ชั่วคราว ข้อมูลกำลังรออัปเดตจาก Sheet...</td></tr>`;
                });
        }

        window.onload = loadHistory;

        // ระบบส่งข้อมูลเมื่อกดปุ่ม
        form.addEventListener('submit', e => {
            e.preventDefault(); // ล็อกหน้าจอ ไม่ให้รีเฟรชหายวับ
            
            submitBtn.disabled = true;
            submitBtn.innerText = 'กำลังส่งข้อมูล...';
            statusMessage.classList.remove('hidden');
            statusMessage.className = 'mt-4 text-center text-sm font-medium p-3 rounded-xl bg-amber-50 text-amber-700 border border-amber-200';
            statusMessage.innerText = '⏳ ระบบกำลังเชื่อมต่อกับ Google Sheet 023...';

            const data = {
                Type: document.getElementById('type').value,
                Category: document.getElementById('category').value,
                Amount: document.getElementById('amount').value,
                Note: document.getElementById('note').value
            };

            fetch(SCRIPT_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: JSON.stringify(data) 
            })
            .then(res => res.json())
            .then(result => {
                statusMessage.className = 'mt-4 text-center text-sm font-medium p-3 rounded-xl bg-green-50 text-green-700 border border-green-200';
                statusMessage.innerText = '✅ บันทึกข้อมูลลงฐานข้อมูลสำเร็จ!';
                form.reset();
                loadHistory(); // บันทึกเสร็จแล้วสั่งคำนวณและแสดงตารางใหม่ทันที
            })
            .catch(error => {
                // ดักกรณีคุยข้ามระบบสำเร็จแต่ติดสิทธิ์แจ้งเตือนเบราว์เซอร์
                statusMessage.className = 'mt-4 text-center text-sm font-medium p-3 rounded-xl bg-green-50 text-green-700 border border-green-200';
                statusMessage.innerText = '✅ ส่งข้อมูลสำเร็จเรียบร้อย! (ตรวจสอบข้อมูลที่ Google Sheet)';
                form.reset();
                loadHistory();
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = 'บันทึกข้อมูล';
            });
        });
    </script>
</body>
</html>
